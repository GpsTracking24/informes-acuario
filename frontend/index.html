<!doctype html> 
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="./css/styles.css" />

  <title>Informes Acuario</title>
</head>
<body class="preload">
  <div class="page">
    <div class="card">
      <h2 id="title">Informes</h2>

      <div class="form-row row g-3 align-items-end">

        <div class="col-auto">
          <div class="field">
            <label for="fleet" class="form-label">Flota</label>
            <select id="fleet" class="form-select">
              <option value="">Seleccione flota</option>
            </select>
          </div>
        </div>

        <div class="col-auto">
          <div class="field">
            <label for="period" class="form-label">Periodo</label>
            <select id="period" class="form-select">
              <option value="hoy" selected>Hoy</option>
              <option value="ayer">Ayer</option>
              <option value="7dias">Últimos 7 días</option>
              <option value="mes">Este mes</option>
              <option value="rango">Fecha desde/hasta</option>
            </select>
          </div>
        </div>

        <div class="col-auto hidden" id="rangePickerBox">
          <div class="field range">
            <label for="dateRange" class="form-label">Rango de fechas</label>
            <input id="dateRange" type="text" class="form-control" placeholder="Seleccione rango"/>
          </div>
        </div>

        <div class="col-auto">
          <button id="btnSelect" class="btn btn-primary" type="button">
            Seleccionar
          </button>
        </div>

        <!-- 🔥 ICONOS -->
        <div id="exportActions" class="col-auto ms-auto" style="display: none;">
  <button id="btnPdf" class="icon-only btn-pdf" data-tooltip="Exportar PDF" type="button">
    <img src="./assets/icons/pdf.png" class="icon-btn" alt="Exportar PDF" />
  </button>

  <button id="btnExcel" class="icon-only btn-excel" data-tooltip="Exportar Excel" type="button">
    <img src="./assets/icons/xlsx.png" class="icon-btn" alt="Exportar Excel" />
  </button>
</div>

      </div>

      <div class="hint hidden" id="hint"></div>

      <div id="reportTabs" class="report-tabs hidden">
        <button class="report-tab active" data-report="speed">Excesos de velocidad</button>
        <button class="report-tab" data-report="geofence">Geocercas</button>
        <button class="report-tab" data-report="parking">Estacionamientos</button>
        <button class="report-tab" data-report="engine_hours">Horas de motor</button>
        <button class="report-tab" data-report="up_time">Tiempo de subida</button>
        <button class="report-tab" data-report="down_time">Tiempo de bajada</button>
      </div>

      <div id="result"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
